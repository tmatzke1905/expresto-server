name: SonarQube

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  sonar:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run coverage

      - name: Sonar scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.projectKey=tmatzke1905_expresto
            -Dsonar.organization=tmatzke1905
            -Dsonar.projectName=expresto
            -Dsonar.sources=src
            -Dsonar.inclusions=src/**
            -Dsonar.exclusions=tests/**,**/tests/**,**/*.test.ts,**/*.spec.ts,dist/**,coverage/**,docs/**,node_modules/**
            -Dsonar.test.exclusions=tests/**,**/tests/**,**/*.test.ts,**/*.spec.ts
            -Dsonar.cpd.exclusions=tests/**,**/tests/**,**/*.test.ts,**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverage.exclusions=tests/**,dist/**,docs/**,src/cli.ts,src/**/*.d.ts,src/lib/types.ts,src/lib/scheduler/types.ts
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required only for self-hosted SonarQube Server:
          # SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
