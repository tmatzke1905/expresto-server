# Core scope
sonar.sourceEncoding=UTF-8
sonar.projectKey=tmatzke1905_expresto
sonar.organization=tmatzke1905
sonar.projectName=expresto
sonar.sources=src
sonar.inclusions=src/**

# Exclude generated/irrelevant folders from analysis
sonar.exclusions=tests/**,**/tests/**,**/*.test.ts,**/*.spec.ts,dist/**,coverage/**,docs/**,node_modules/**
sonar.test.exclusions=tests/**,**/tests/**,**/*.test.ts,**/*.spec.ts
sonar.cpd.exclusions=tests/**,**/tests/**,**/*.test.ts,**/*.spec.ts

# Coverage from Vitest (lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=tests/**,dist/**,docs/**,src/cli.ts,src/**/*.d.ts,src/lib/types.ts,src/lib/scheduler/types.ts
